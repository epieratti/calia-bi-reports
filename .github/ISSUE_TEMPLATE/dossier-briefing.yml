name: Briefing — novo dossiê (brand safety)
description: Pedido para criar ou atualizar um dossiê modo B. Preencha os itens essenciais (E).
title: "[Dossiê] "
labels: ["dossier", "briefing"]
body:
  - type: markdown
    attributes:
      value: |
        **Guia:** `PLAYBOOK_AGENTES.md` → `PLAYBOOK_DOSSIES.md` (Pipeline §1). Idioma do entregável: **pt-BR**.
        O **nome do arquivo `.html`** é gerado pelo agente (`YYYYMMDD-dossie-<slug>.html`). Informe a **pasta** de publicação.
        **Senha:** **não** colar a senha em texto aqui se a issue for **pública** — use **referência** ou “envio por DM/Slack/cofre”. Ver `docs/GOVERNANCA_ENTREGA.md` no repo.

  - type: textarea
    id: cliente
    attributes:
      label: (E) Cliente / campanha / produto
      description: Para quem é o dossiê; unidade; contexto.
    validations:
      required: true

  - type: textarea
    id: objetivo
    attributes:
      label: (E) Objetivo
      description: O que o leitor deve decidir ou entender ao final.
    validations:
      required: true

  - type: textarea
    id: perfis
    attributes:
      label: (E) Perfis
      description: Lista Nome + @ quando souber, ou “descobrir a partir de …”.
    validations:
      required: true

  - type: dropdown
    id: pasta
    attributes:
      label: (E) Pasta de publicação (HTML no Pages)
      options:
        - caixa/
        - caixa/loterias/
        - embratur/
        - outra (descrever no campo “Notas”)
    validations:
      required: true

  - type: textarea
    id: senha_ref
    attributes:
      label: (E) Senha do gate — referência (não colar segredo em issue pública)
      description: |
        Exemplos: “Mesmo `password_sha256_hex` que `caixa/20260401-dossie-….html`” · “Senha nova — te envio no Slack” · “Hash já está no branch, combinar por DM”.
        Se a issue for **privada** e a política do time permitir, pode colar o texto da senha **só** nesse caso.
    validations:
      required: true

  - type: dropdown
    id: modo
    attributes:
      label: (C) Modo de entrega
      options:
        - B — .md + gerador (padrão squad)
        - A — HTML manual
        - C — pesquisa → HTML na mão
        - igual ao último dossiê (descrever qual)

  - type: textarea
    id: criterios
    attributes:
      label: (O) Critérios / redes / notas
      description: Concorrência, política, polêmica; redes no âmbito; delta vs lote anterior; MVP.
