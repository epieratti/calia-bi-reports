name: Verificar vazamento em HTML do cliente

on:
  pull_request:
    paths:
      - "caixa/**/*.html"
      - "febraban/**/*.html"
      - "embratur/**/*.html"
      - "engine/qa/check_html_leakage.py"
  push:
    branches: [main]
    paths:
      - "caixa/**/*.html"
      - "febraban/**/*.html"
      - "embratur/**/*.html"
      - "engine/qa/check_html_leakage.py"

jobs:
  leakage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Varredura anti-vazamento
        run: python3 engine/qa/check_html_leakage.py caixa febraban embratur
