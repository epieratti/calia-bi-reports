# Verifica se HTML publicado (Caixa / Embratur) expõe caminhos do repo no texto visível
name: Verificar vazamento em HTML do cliente

on:
  pull_request:
    paths:
      - "caixa/**/*.html"
      - "embratur/**/*.html"
      - "tools/check_client_html_leakage.py"
  push:
    branches: [main]
    paths:
      - "caixa/**/*.html"
      - "embratur/**/*.html"
      - "tools/check_client_html_leakage.py"

jobs:
  leakage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Varredura anti-vazamento
        run: python3 tools/check_client_html_leakage.py caixa embratur
