# Publicação via Actions. Uma vez no repositório: Settings → Pages → Source: "GitHub Actions".
# Alternativa sem Actions: Source "Deploy from a branch" → main → / (root).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# actions: read — necessário para o deploy-pages localizar o artefacto "github-pages"
# na mesma execução (sem isto, a API devolve 0 artefactos e o deploy falha).
permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # Evita corrida: o deploy-pages por vezes corre antes do artefacto ficar visível na API.
      - name: Aguardar índice do artefacto
        run: sleep 15

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
