# Deploy GitHub Pages — publica só a superfície do site
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Montar artefato do site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets _site/
          cp -r caixa febraban embratur _site/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Aguardar índice do artefacto
        run: sleep 15

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
