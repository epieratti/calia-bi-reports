name: Validar fontes dossier (*.md)

on:
  pull_request:
    paths:
      - "**/dossier_*.md"
      - "**/dossier_*_panels.yaml"
      - "engine/qa/validate_source.py"
      - "engine/core/md_dossier_source.py"
      - "engine/core/dossier_plain.py"
  push:
    branches: [main]
    paths:
      - "**/dossier_*.md"
      - "**/dossier_*_panels.yaml"
      - "engine/qa/validate_source.py"
      - "engine/core/md_dossier_source.py"
      - "engine/core/dossier_plain.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar PyYAML
        run: pip install pyyaml
      - name: Listar e validar dossier_*.md
        run: |
          set -e
          found=0
          while IFS= read -r -d '' f; do
            found=1
            echo "=== $f ==="
            python3 engine/qa/validate_source.py --hints "$f"
          done < <(find . -name 'dossier_*.md' -not -path './.git/*' -print0)
          if [ "$found" -eq 0 ]; then
            echo "Nenhum dossier_*.md encontrado."
          fi
