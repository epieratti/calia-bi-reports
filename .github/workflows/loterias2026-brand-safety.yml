# Opcional: segredos via GitHub (repository secrets) ou via 1Password (Service Account + referências op://).
# Execute manualmente para gerar artefatos de Brand Safety em loterias2026/output/.
name: Loterias 2026 — Brand Safety (coleta + relatório)

on:
  workflow_dispatch:
    inputs:
      secrets_source:
        description: "Onde obter APIFY_TOKEN e tokens opcionais"
        type: choice
        options:
          - github
          - 1password
        default: github

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          cd loterias2026
          python -m pip install -U pip
          pip install -r requirements.txt

      # --- Segredos: GitHub (padrão anterior) ---
      - name: Checar secret APIFY_TOKEN (GitHub)
        if: github.event.inputs.secrets_source == 'github'
        run: |
          if [ -z "${{ secrets.APIFY_TOKEN }}" ]; then
            echo "::error::Defina o Repository secret APIFY_TOKEN: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "APIFY_TOKEN está definido (valor oculto)."

      # --- Segredos: 1Password (load-secrets-action v4) ---
      # Crie uma Service Account e o secret OP_SERVICE_ACCOUNT_TOKEN.
      # Ajuste loterias2026/.env.1password.tpl com op://Cofre/Item/campo reais.
      - name: Carregar segredos (1Password)
        if: github.event.inputs.secrets_source == '1password'
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: loterias2026/.env.1password.tpl

      - name: Verificar APIFY_TOKEN após 1Password
        if: github.event.inputs.secrets_source == '1password'
        run: |
          if [ -z "$APIFY_TOKEN" ]; then
            echo "::error::APIFY_TOKEN vazio após 1Password. Verifique OP_SERVICE_ACCOUNT_TOKEN, permissões da conta de serviço e referências em loterias2026/.env.1password.tpl."
            exit 1
          fi
          echo "APIFY_TOKEN carregado (valor oculto)."

      - name: Pipeline — segredos do GitHub
        if: github.event.inputs.secrets_source == 'github'
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: |
          cd loterias2026
          python scripts/run_pipeline.py

      - name: Pipeline — segredos do 1Password
        if: github.event.inputs.secrets_source == '1password'
        run: |
          cd loterias2026
          python scripts/run_pipeline.py

      - name: Upload artefatos (JSONL, CSV, HTML)
        uses: actions/upload-artifact@v4
        with:
          name: loterias2026-brand-safety
          path: |
            loterias2026/data/raw/
            loterias2026/data/processed/
            loterias2026/output/
