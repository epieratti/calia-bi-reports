# Validação leve das fontes .md dos dossiês Loterias (estrutura + aviso de MD em campos planos)
name: Validar fontes dossiê Loterias

on:
  pull_request:
    paths:
      - "loterias2026/data/dossier_loterias2026.md"
      - "loterias2026-20260406/data/dossier_loterias2026.md"
      - "tools/validate_dossier_source.py"
      - "tools/dossier_plain.py"
  push:
    branches: [main]
    paths:
      - "loterias2026/data/dossier_loterias2026.md"
      - "loterias2026-20260406/data/dossier_loterias2026.md"
      - "tools/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar PyYAML
        run: pip install pyyaml
      - name: Validar dossier 13 perfis
        run: python3 tools/validate_dossier_source.py loterias2026/data/dossier_loterias2026.md
      - name: Validar dossier 8 perfis
        run: python3 tools/validate_dossier_source.py loterias2026-20260406/data/dossier_loterias2026.md
