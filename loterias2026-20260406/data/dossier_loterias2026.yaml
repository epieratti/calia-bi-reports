briefing:
  intro_paragraphs:
    - "Este dossiê avalia **risco de imagem (brand safety)** para uma campanha de loterias da Caixa com **oito influenciadores** do squad Always ON 2026. Nas páginas seguintes, o que foi verificado em cada eixo; o **método** está em **Como foi analisado**."
    - "Quando dizemos que **não encontramos** algo, quer dizer que **não apareceu** nas fontes públicas que usamos neste levantamento. Pode haver outros dados fora do escopo."
  criterios:
    - "Concorrência: vínculo com outras loterias, casas de apostas, cassino ou jogos de azar — inclusive **humor** que cite aposta e possa ser lido como associação indevida, mesmo sem publi paga."
    - "Polêmicas: falas, episódios ou exposição na mídia que possam afetar a percepção da marca."
    - "Política: **filiação partidária** quando houver registro público **e** **proximidade reputacional** com **qualquer polo** — **esquerda / governo federal** (**PT**, **Lula**, **Planalto**, pautas oficiais) **ou** **direita** (**PL**, **Bolsonaro**, aliados, pautas bolsonaristas ou de extrema-direita), mesmo **sem** filiação formal (eventos, apoios, conteúdo recorrente). Em leitura de **campanha**, esquerda e direita **não** são tratadas como independentes: se há evidência forte de vínculo com um polo, **não** exigimos, em cada ficha, uma frase extra dizendo que a pessoa não está com o outro — só registramos **exceções** (por exemplo, crítica explícita ao próprio polo). Em **2026**, também sinais que adversários possam explorar. O detalhe está em **Política e eleições** (Como foi analisado)."
  redes:
    - "Instagram"
    - "TikTok"
    - "YouTube"
  tier_order:
    - "Squad (8)"

methodology:
  columns:
    - label: "Imprensa e buscas"
      body: "Começamos por notícias e buscas na web e cruzamos com o que já consta em **fonte pública**."
    - label: "Redes sociais"
      body: "Revisamos os perfis **públicos** do creator no Instagram, TikTok e YouTube na **data da coleta**."
    - label: "Tamanho de público (painéis)"
      body: "Social Blade (Instagram e YouTube, quando o canal está indexado) e Upfluence (TikTok) servem só para **tamanho de audiência** e engajamento; **não** substituem o juízo sobre risco de imagem."
    - label: "Política e eleições (2026)"
      body: |
        Olhamos **filiação** (TSE), **candidatura** e **proximidade** com **governo / PT / Lula / Planalto** ou **direita / PL / Bolsonaro** (e **extrema-direita**, se houver prova): agendas, apoios, conteúdo recorrente. **Não** entra **humor pontual** nem **menção isolada** — o alvo é **rótulo** de campanha (“petista”, “bolsonarista”). Sem achado: **sem ligação política documentada** (lista de nomes e partidos nos **Critérios**). Se o perfil está **claro** de um lado, **não** repetimos em toda ficha “não é do outro”; só **exceções** que mudem o quadro.

        **Agenda federal** = na prática da imprensa, **compromisso oficial** com o presidente no **Planalto**. **Documentado** = **matéria pública com link** que mostre **proximidade com o governo na mídia**.

