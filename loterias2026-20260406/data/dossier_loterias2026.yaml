executive_summary:
  tagline: "Leitura em duas colunas: o que importa em **concorrência** e o que importa em **política e exposição**. O passo a passo por nome está em **Perfis** e na **tabela resumo**."
  blocks:
    - title: "Concorrência (bets / loterias)"
      items:
        - "Nas fontes que consultamos (busca na web e imprensa), não apareceu publicidade paga para casa de apostas nem para loteria concorrente à Caixa."
        - "Bárbara Coura usa o personagem **\"tia que aposta\"** em vídeos de humor (**sátira**). A **Coletiva** cobriu a creator em [matéria de 2023 (Festival de Gramado)](https://coletiva.net/noticias/so-vi-que-era-publi-no-final-barbara-coura-defende-liberdade-para-criadores/) (contexto de publicidade e criadores; não é a lista de personagens do canal)."
        - "Rafael Saraiva participou do sketch **\"Bet Kids\"** ([**Porta dos Fundos — vídeo**](https://portadosfundos.com.br/videos/bet-kids/)): humor; **Bet** só no título — sensibilidade de **leitura**."
    - title: "Política e exposição"
      items:
        - "**Ademara:** em **2023**, [**UOL Universa**](https://www.uol.com.br/universa/noticias/redacao/2023/02/24/influenciadora-ademara-sobre-encontro-com-lula-nao-foi-viagem-de-ferias.htm) e [**Poder360**](https://www.poder360.com.br/governo/lula-discute-mobilizacao-da-sociedade-digital-com-influenciadores/) publicaram **encontro oficial com o presidente** no **Planalto** — **agenda federal** (compromisso de governo). Evidência: **matérias públicas com link**; leitura de **proximidade reputacional com o governo na mídia**. Em **2026**, risco de **rotulação** e **reação** adversária ao arquivo."
        - "**Raphael Vicente:** o [**Estadão**](https://www.estadao.com.br/emais/gente/influencer-diz-que-casa-foi-invadida-em-operacao-policial-na-mare-muito-indignado-nprec/) (2023) cobriu **Maré**, operação policial e relato em domicílio; [**YOUPIX**](https://youpix.com.br/vozes-das-comunidades-10-creators-que-amplificam-culturas-e-tradicoes/) lista o perfil entre creators e comunidades. Tema **segurança pública**, recortável em eleição."
        - "**Rafael Saraiva:** na [**Veja**](https://veja.abril.com.br/coluna/veja-gente/nao-quero-me-tornar-comediante-da-extrema-direita-diz-rafael-saraiva/), posicionamento sobre **humor e extrema-direita** (citação do artista). **Risco em 2026:** **recorte** fora de contexto. [**Heloísa Tolipan**](https://heloisatolipan.com.br/tv/rafael-saraiva-do-porta-dos-fundos-fala-sobre-critica-a-nova-novela-das-6-e-de-ter-sido-vitima-de-11-assaltos/): pauta urbana / entretenimento (assaltos)."
        - "**Lore Rufis (Lorena Rufino):** em **2022**, [**Bahia Notícias**](https://www.bahianoticias.com.br/noticia/273276-video-lore-rufis-acusa-roberta-roma-de-uso-indevido-de-video-em-campanha) e [**Boca de Forno News**](https://bocadefornonews.com.br/noticia/12557/influenciadora-lore-rufis-acusa-roberta-roma-de-uso-indevido-de-video-em-campanha): **conflito público** com uso de vídeo na campanha de **Roberta Roma (PL)**. Arquivo recortável em **2026**."
        - "**Pedro Ottoni:** o ator **Pedro Ottoni** (duplo **tt**) **não** é o deputado **Otoni de Paula** (PSD) — [**Folha**](https://www1.folha.uol.com.br/colunas/painel/2026/03/otoni-se-filia-ao-psd-e-diz-que-vai-ajudar-caiado-chegar-aos-evangelicos.shtml)."

consolidated_narrative:
  title: "Síntese do conjunto"
  subtitle: "__06/04/2026__ — oito perfis com forte peso em **humor**, **entretenimento** e **audiovisual**."
  tagline: "Elaborado pela Calia para apoio à decisão de campanha."
  blocks:
    - title: "Leitura para Caixa"
      items:
        - "Em conjunto, o squad trabalha com **humor em vídeo**; o risco mais relevante para loterias não é só “marca errada”, e sim **leitura equivocada** pelo público (ex.: aposta citada em humor)."
        - "Os números de alcance nas redes são um **retrato da data** da coleta; não substituem compliance contratual nem parecer jurídico."

