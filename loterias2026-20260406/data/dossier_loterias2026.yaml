  intro_paragraphs:
    - "Este dossiê avalia **risco de imagem (brand safety)** para uma campanha de loterias da Caixa com **oito influenciadores** do squad Always ON 2026. Nas páginas seguintes, o que foi verificado em cada eixo; o **método** está em **Como foi analisado**."
    - "Quando dizemos que **não encontramos** algo, quer dizer que **não apareceu** nas fontes públicas que usamos neste levantamento. Pode haver outros dados fora do escopo."
  criterios:
    - "Concorrência: vínculo com outras loterias, casas de apostas, cassino ou jogos de azar — inclusive **humor** que cite aposta e possa ser lido como associação indevida, mesmo sem publi paga."
    - "Polêmicas: falas, episódios ou exposição na mídia que possam afetar a percepção da marca."
    - "Política: **filiação**, **candidatura** e **proximidade** com esquerda/governo (**PT**, **Lula**, **Planalto**) ou direita (**PL**, **Bolsonaro**, **extrema-direita** com prova), além de sinais relevantes em **2026**. Regras completas em **Política e eleições** (Como foi analisado)."
  redes:
    - "Instagram"
    - "TikTok"
    - "YouTube"
  tier_order:
    - "Squad (8)"

