briefing:
  intro_paragraphs:
    - "Este dossiê avalia **risco de imagem (brand safety)** para uma campanha de loterias da Caixa, com **oito influenciadores** do squad Always ON 2026. Nas páginas seguintes listamos o que foi verificado em cada eixo; a forma como a análise foi feita está explicada em **Como foi analisado**."
    - "Quando o texto diz que **não encontramos** algo, significa que não houve evidência pública nas fontes que consultamos — ainda assim, pode existir informação fora desse levantamento."
  criterios:
    - "Concorrência: buscamos vínculo com outras loterias, casas de apostas, cassino ou jogos de azar, incluindo humor que cite aposta e possa ser lido como associação indevida, mesmo sem publicidade paga."
    - "Polêmicas: falas, episódios ou exposição na mídia que possam afetar a percepção da marca."
    - "Política: **filiação partidária** quando houver registro público **e** **proximidade reputacional** com **qualquer polo** — **esquerda / governo federal** (**PT**, **Lula**, **Planalto**, pautas oficiais) **ou** **direita** (**PL**, **Bolsonaro**, aliados, pautas bolsonaristas ou de extrema-direita) — ainda que **sem** filiação formal (eventos, apoios, conteúdo recorrente). Na leitura de **campanha**, **não** tratamos os dois polos como independentes: evidência forte com **um** lado **já** afasta, no mesmo sentido, alinhamento com o **oposto** (não repetimos essa obviedade caso a caso). Em **2026**, também sinais que adversários possam usar em narrativa. Detalhes em **Política e eleições**, em Como foi analisado."
  redes:
    - "Instagram"
    - "TikTok"
    - "YouTube"
  tier_order:
    - "Squad (8)"

methodology:
  columns:
    - label: "Imprensa e buscas"
      body: "Partimos de notícias e buscas na internet e cruzamos com menções que já aparecem citadas em fonte pública."
    - label: "Redes sociais"
      body: "Os perfis públicos do creator no Instagram, TikTok e YouTube foram revisados na data da coleta."
    - label: "Tamanho de público (painéis)"
      body: "Usamos Social Blade (Instagram e YouTube, quando o canal está na base) e Upfluence (TikTok) só para medir alcance e engajamento; esses números **não substituem** o julgamento de risco de imagem."
    - label: "Política e eleições (2026)"
      body: |
        Além de **filiação** em TSE ou candidatura, mapeamos **proximidade** com **governo federal / PT / Lula / Planalto** ou com **direita / PL / Bolsonaro** (incl. **extrema-direita** quando houver evidência pública) — reuniões, agendas, endossos, conteúdo recorrente. Isso é distinto de mero humor ou menção pontual. O objetivo é antecipar **rotulação** (“petista”, “bolsonarista”, etc.). **Leitura polarizada:** quem está **alinhado** a um lado **não** precisa de linha separada “não está com o outro” — só registramos **exceções** (ex.: crítica ao próprio polo, ou fatos que contrariem o quadro). Nos **perfis**, quando não há achado, usamos a forma curta **sem ligação política documentada**; o rol de partidos e figuras para checagem está em **criterios** (briefing) e neste texto.

        Quando o dossiê citar **matérias** sobre **compromisso oficial** com o presidente no **Palácio do Planalto**, em linguagem de Brasília isso costuma ser chamado de **agenda federal** — **pauta de compromissos do governo**. **Documentado** = **fato noticiado** em matéria **pública** (com link), como evidência de **proximidade reputacional com o governo na mídia**.

