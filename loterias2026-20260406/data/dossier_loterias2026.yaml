executive_summary:
  tagline: "Duas colunas abaixo: **concorrência** (apostas e loterias) e **política / exposição**. O detalhe por pessoa está em **Perfis** e na **tabela resumo**."
  blocks:
    - title: "Concorrência (bets / loterias)"
      items:
        - "Nas buscas e na imprensa que usamos, **não** apareceu publicidade paga de casa de apostas nem de loteria concorrente da Caixa para nenhum dos oito."
        - "**Bárbara Coura** tem o personagem de humor **\"tia que aposta\"** (é **sátira**). A [**Coletiva**](https://coletiva.net/noticias/so-vi-que-era-publi-no-final-barbara-coura-defende-liberdade-para-criadores/) cobriu a creator em 2023 (Festival de Gramado); o texto fala de publi e criadores — **não** é catálogo de personagens do canal."
        - "**Rafael Saraiva** participou do sketch [**Bet Kids**](https://portadosfundos.com.br/videos/bet-kids/) no **Porta dos Fundos**. É humor; a palavra **Bet** está **só no título**, mas pode gerar associação — vale alinhar **leitura** de risco."
    - title: "Política e exposição"
      items:
        - "**Ademara:** em **2023**, [**UOL Universa**](https://www.uol.com.br/universa/noticias/redacao/2023/02/24/influenciadora-ademara-sobre-encontro-com-lula-nao-foi-viagem-de-ferias.htm) e [**Poder360**](https://www.poder360.com.br/governo/lula-discute-mobilizacao-da-sociedade-digital-com-influenciadores/) noticiaram **encontro oficial com o presidente** no **Planalto** (compromisso de **agenda federal**, não viagem particular). Há **matérias públicas com link**; na leitura de campanha, isso aponta **proximidade com o governo na mídia**."
        - "**Raphael Vicente:** em **2023**, o [**Estadão**](https://www.estadao.com.br/emais/gente/influencer-diz-que-casa-foi-invadida-em-operacao-policial-na-mare-muito-indignado-nprec/) cobriu operação policial na **Maré** e o relato de revista em casa. A [**YOUPIX**](https://youpix.com.br/vozes-das-comunidades-10-creators-que-amplificam-culturas-e-tradicoes/) cita o creator entre perfis ligados a **comunidades**. O tema é **segurança pública** — sensível em ano eleitoral."
        - "**Rafael Saraiva:** na [**Veja**](https://veja.abril.com.br/coluna/veja-gente/nao-quero-me-tornar-comediante-da-extrema-direita-diz-rafael-saraiva/), entrevista em que fala de **humor e extrema-direita** (fala do próprio artista). Em **2026**, trechos podem ser **recortados** fora de contexto. Na [**Heloísa Tolipan**](https://heloisatolipan.com.br/tv/rafael-saraiva-do-porta-dos-fundos-fala-sobre-critica-a-nova-novela-das-6-e-de-ter-sido-vitima-de-11-assaltos/), entrevista em que ele **criticou a novela das 6** e **disse ter sofrido onze assaltos** (relato pessoal em pauta de TV/entretenimento)."
        - "**Lore Rufis (Lorena Rufino):** em **2022**, [**Bahia Notícias**](https://www.bahianoticias.com.br/noticia/273276-video-lore-rufis-acusa-roberta-roma-de-uso-indevido-de-video-em-campanha) e [**Boca de Forno News**](https://bocadefornonews.com.br/noticia/12557/influenciadora-lore-rufis-acusa-roberta-roma-de-uso-indevido-de-video-em-campanha) noticiaram **conflito público** sobre uso de vídeo na campanha de **Roberta Roma (PL)**. Material antigo, mas **recortável** em **2026**."

consolidated_narrative:
  title: "Síntese do conjunto"
  subtitle: "__06/04/2026__ — oito perfis com forte presença em **humor**, **entretenimento** e **audiovisual**."
  tagline: "Elaborado pela Calia para apoiar a decisão de campanha."
  blocks:
    - title: "Leitura para Caixa"
      items:
        - "O squad é, em geral, de **humor em vídeo**. Para loterias, o risco central não é só “parceria com marca errada”, e sim o que o **público entende** — por exemplo, piada com **aposta** que vire associação indesejada com jogo."
        - "Os números de alcance nas redes são um **retrato** da data da coleta; **não** substituem contrato, compliance nem parecer jurídico."

