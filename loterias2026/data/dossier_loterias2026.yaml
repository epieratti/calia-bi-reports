    eixos:
      concorrencia: "Não achamos casa de aposta ou publi de jogo no material público que cruzamos."
      polemicas: "Como outros criadores indígenas, está sujeito a comentários hostis e desinformação — risco de **comentários tóxicos** na publicação, não de conduta inadequada dele."
      politica: "Defesa de território, crítica ao Marco Temporal e a políticas vistas como anti-indígenas. Perfil alinhado a direitos humanos e agenda ambiental."

