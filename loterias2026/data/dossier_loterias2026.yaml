    narrativa: "Cantora e compositora com raiz no forró e na cena nordestina; passou por reality musical (The Voice) e costura música com presença digital e shows. O humor e o sotaque cearense são marca forte do conteúdo. Parcerias regionais com marcas de alimento e cultura aparecem na imprensa local e em releases."
    eixos:
