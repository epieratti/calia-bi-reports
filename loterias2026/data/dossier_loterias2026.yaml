consolidated_narrative:
  title: "Síntese adicional do squad"
  subtitle: "__Abril/2026__ — ver junto com **Perfis**, **Tabela resumo** e **métricas**."
  tagline: "O que pode pesar na **decisão da campanha**, além do texto por nome."
  blocks:
    - title: "Visão geral"
      items:
        - "Bom encaixe para **humor**, **diversidade** e **causas sociais**."
        - "Se a peça precisar ficar **longe de política**, **Ivan Baron** e **Catraca Livre** são os que mais falam de política no que vimos — alinhar com **jurídico** e **comunicação**. Não é sugestão de casting; é **cuidado a mais**."
    - title: "Concorrência"
      items:
        - "Pessoas: **não achamos** publi de bet ou de outra loteria contra a CAIXA no que buscamos."
        - "Nome com “bet” em **curso ou site** **não é** o mesmo que publi de **casa de aposta**."
        - "**Catraca Livre**: texto que **leva** a site de aposta. **Gratta**: evento de **bolsa/corretora** sobre apostas (**aula**, não publi de bet)."

executive_summary:
  tagline: "**13 nomes** — **resumo**; o resto está nos perfis e na tabela."
  blocks:
    - title: "Quem entra"
      items:
        - "**13 nomes**: 12 pessoas + __Catraca Livre__. **Camadas**: Pitel (1), Gratta (2), 4 Mezzos, 6 Micros."
        - "O que olhamos: **concorrência** (bets, loterias, jogos), **polêmicas**, **política**."
    - title: "Concorrência"
      items:
        - "Pessoas: **não achamos** contrato público com casa de apostas no que buscamos."
        - "**Catraca Livre**: fala do setor + **guia** que manda para site de aposta — ver com **jurídico** antes de ligar à **CAIXA**."
        - "**Gratta**: evento de **bolsa/corretora** sobre apostas (**informação**, não publi de bet)."
    - title: "Política e imagem"
      items:
        - "Quem mais fala de **política** no que vimos: **Baron**, **Catraca**; também **Wariu** (indígena e meio ambiente) e **Pitel** (causas sociais, **sem partido** claro)."
        - "**Apostas** na **TV e no Congresso** deixam o tema sensível; isso não é “lado” dos talentos."
        - "Barulho a mais: **Gratta** (saúde/venda), **Pitel** (BBB), **Mila** (**conta invadida** — não é atitude dela); resto **quieto** no que vimos."
    - title: "Checagem extra"
      items:
        - "**Davi** (davizoa): muito alcance nas redes e **pouca notícia** — **confirmar com a agência**."

