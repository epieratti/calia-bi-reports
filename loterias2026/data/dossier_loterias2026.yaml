consolidated_narrative:
  title: "Síntese adicional do squad"
  subtitle: "__Abril/2026__ — ver junto com **Perfis**, **Tabela resumo** e **métricas**."
  tagline: "O que pode pesar na **decisão da campanha**, além do texto por nome."
  blocks:
    - title: "Visão geral"
      items:
        - "Bom encaixe para **humor**, **diversidade** e **causas sociais**."
        - "Se a peça precisar ficar **longe de política**, **Ivan Baron** e **Catraca Livre** são os que mais falam de política no que vimos."
    - title: "Concorrência"
      items:
        - "Pessoas: **não achamos** publi de bet ou de outra loteria contra a CAIXA no que buscamos."
        - "Nome com “bet” em **curso ou site** **não é** o mesmo que publi de **casa de aposta**."
        - "**Catraca Livre**: [guia no portal](https://catracalivre.com.br/noticias/uplinko-fashion-tv-guia-completo-2025/) que encaminha a site de aposta. **Gratta**: evento de **bolsa/corretora** sobre apostas (**aula**, não publi de bet)."

executive_summary:
  tagline: "**13 nomes** — **resumo**; o resto está nos perfis e na tabela."
  blocks:
    - title: "Quem entra"
      items:
        - "**13 nomes**: 12 pessoas e Catraca Livre (página). **Camadas**: Pitel (1), Gratta (2), 4 Mezzos, 6 Micros."
        - "O que olhamos: **concorrência** (bets, loterias, jogos), **polêmicas**, **política**."
    - title: "Concorrência"
      items:
        - "Pessoas: **não achamos** contrato público com casa de apostas no que buscamos."
        - "**Catraca Livre**: fala do setor e [guia no portal](https://catracalivre.com.br/noticias/uplinko-fashion-tv-guia-completo-2025/) que encaminha a site de aposta — ver com **jurídico** antes de ligar à **CAIXA**."
        - "**Gratta**: evento de **bolsa/corretora** sobre apostas (**informação**, não publi de bet)."
    - title: "Política e imagem"
      items:
        - "Quem mais fala de **política** no que vimos: **Baron**, **Catraca**; também **Wariu** (indígena e meio ambiente) e **Pitel** (causas sociais, **sem partido** claro)."
        - "Hoje **apostas** aparecem muito na **TV e no Congresso**; isso deixa o assunto sensível para qualquer campanha de **loterias**, **sem** dizer que os talentos desta lista têm lado político por causa disso."
        - "Barulho a mais: **Gratta** (saúde/venda), **Pitel** (BBB), **Mila** (conta invadida em golpe — **ela foi vítima**, não autora); resto **quieto** no que vimos."

profiles:
  - name: "Giovanna Pitel"
    tier: "Tier 1"
    risco_geral: "Baixo a moderado — alta visibilidade na mídia"
    resumo_tabela:
      concorrencia: "Sem bet/loteria concorrente no que vimos."
      polemicas: "BBB e mídia; pautas que polarizam."
      politica: "Causas sociais; sem partido explícito."
    handles:
      instagram: pitelgiovanna
      tiktok: pitelgiovanna
      youtube: pitelgiovanna
      x: pitelgiovanna
    narrativa: "Saiu do BBB com imagem de voz crítica e formação em Serviço Social. Hoje mistura entretenimento (TV Globo, realities) com campanhas de marcas de consumo e causas sociais. A imprensa de cultura e celebridades costuma citar também a trajetória de empoderamento capilar e representatividade — perfil de alta visibilidade, onde qualquer fala pública ganha eco rápido."
    eixos:
      concorrencia: "Não achamos publi de casa de aposta, cassino ou outra loteria. No histórico público aparecem parcerias com laticínios, telefonia, beleza e entretenimento — nada que conflite diretamente com loterias no que vimos."
      polemicas: "Exposição típica de ex-BBB: colunas, comparações e cobertura contínua. Na imprensa, relatos de que ela sofreu xenofobia após o programa (não como autora do episódio); também comentou publicamente leis polêmicas (ex.: direitos reprodutivos) — temas que podem polarizar audiência."
      politica: "Pautas sociais, periferia, gênero e direitos humanos aparecem de forma recorrente. Não há filiação partidária clara nas fontes que vimos; o risco para peça institucional é mais de **sensibilidade** do que de rótulo eleitoral."

  - name: "Rafael Gratta"
    tier: "Tier 2"
    risco_geral: "Moderado — reputação em conteúdo de saúde e vendas"
    resumo_tabela:
      concorrencia: "Sem publi de bet; evento educação financeira (bolsa)."
      polemicas: "Debate sobre método, venda e plágio (redes e imprensa)."
      politica: "Sem partido; em alguns vídeos, tom próximo à direita."
    handles:
      instagram: rafaelgratta
      tiktok: rafaelgratta
      youtube: rafaelgratta
      x: rafaelgratta
    narrativa: "Médico com canal massivo sobre ansiedade, foco, hábitos e performance pessoal. Vende cursos e conteúdo digital próprio e tem livro com editora de grande circulação. É um dos nomes com **maior peso de audiência** do squad; qualquer crise de credibilidade ou promessa exagerada repercute em escala."
    eixos:
      concorrencia: "Não achamos contrato público com casa de aposta ou outra loteria. Há curso cujo site traz “bet” no nome — no que vimos trata de **educação financeira**, não de publi de jogo. Participou de evento de bolsa/corretora sobre apostas como **informação de mercado**, não como garoto-propaganda de operador."
      polemicas: "Há **debate público** sobre **método**, **promessas na venda** e **plágio** de roteiro: em **Reddit**, **YouTube** e fóruns isso aparece como **opinião e denúncia de usuários**. **Veículos de imprensa** também tratam do **modelo de negócio** (coaching, neuro, espiritualidade); o ponto sensível para marca é **credibilidade**, mais do que um episódio único de escândalo."
      politica: "Não achamos engajamento político-partidário relevante nas buscas. Em alguns vídeos o discurso sobre liberdade religiosa e Estado aproxima-se de **argumentos usados pela direita**, sem endosso explícito a candidato no que vimos."

  - name: "Índio Behn"
    tier: "Mezzos"
    risco_geral: "Baixo"
    resumo_tabela:
      concorrencia: "Sem bet/loteria concorrente."
      polemicas: "Sem alerta grave no que vimos."
      politica: "Humor pode cutucar política; sem partido claro."
    handles:
      instagram: indio.behn
      tiktok: indio.behn
      youtube: indio.behn
      x: indio_behn
    narrativa: "Humorista e ator conhecido por personagens como a Dra. Rosângela, sátira da cultura “good vibes” e terapias leves. Participa de podcasts de grande alcance; o tom é **entretenimento** com crítica de costumes, não militância pesada. Público misto, incluindo família."
    eixos:
      concorrencia: "Sem ligação com casa de aposta ou outra loteria no que buscamos. Título de show ou roteiro com a palavra “loteria” entra como **humor/arte**, não como publi de jogo."
      polemicas: "Imprensa de entretenimento cobre o trabalho de forma positiva ou neutra. Não achamos episódio grave ou recorrente de cancelamento nas fontes abertas que usamos."
      politica: "O humor pode cutucar política e classe média, sem filiação partidária clara."

