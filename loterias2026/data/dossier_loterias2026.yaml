      tiktok: nocasomila
      youtube: nocasomila
      x: nocasomila
    narrativa: "Criadora do “No Caso Mila”: humor sobre vida adulta, maternidade, diferenças regionais (Cearense em Recife é narrativa recorrente) e rotina sem filtro. Tem colunas e campanhas com órgãos e marcas grandes no Nordeste; audiência engajada no Instagram. O tom é **relatable**, com risco baixo de polêmica política se a peça for neutra."
    eixos:
      concorrencia: "Histórico de campanhas com curso preparatório e marcas de consumo; não achamos casa de aposta ou outra loteria no que vimos."
      polemicas: "Em 2023 a imprensa noticiou invasão de conta e telefone para golpe com Pix — risco de **segurança digital**, não de conduta dela. Se o caso voltar à tona, ter resposta pronta (crise de imagem)."
      politica: "Ela mesma falou em entrevistas sobre pressão por posição política e preferência por não polarizar. Para campanha institucional, alinhar expectativa de neutralidade no contrato."

