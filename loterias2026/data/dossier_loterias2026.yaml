  - name: "Ivan Baron"
    tier: "Mezzos"
    risco_geral: "Moderado — política e causas explícitas"
    resumo_tabela:
      concorrencia: "Sem bet; checar política de álcool na peça."
      polemicas: "Cinema: discriminação; vitória na Justiça (vítima). Sofre críticas por defender inclusão."
      politica: "Progressista; checar filiação se a peça exigir neutralidade."
    handles:
      instagram: ivanbaron
      tiktok: ivanbaron
      youtube: ivanbaron
      x: ivanbaron
    narrativa: "Pedagogo e ativista por inclusão da pessoa com deficiência; figura recorrente em campanhas de órgãos públicos (educação, acessibilidade) e em eventos nacionais de grande visibilidade. Produz série e conteúdo sobre vida com paralisia cerebral, citados na imprensa especializada e em veículos generalistas — **alto reconhecimento** em pauta de diversidade, com exposição política explícita em redes."
    eixos:
      concorrencia: "Aparições em podcast e mídia ao lado de marcas de bebida e instituições — avaliar se o contrato da peça Loterias exige neutralidade sobre álcool. Sem bet no que vimos."
      polemicas: "Recebe críticas de quem **rejeita** políticas inclusivas; comenta decisões do governo. No cinema, caso de discriminação contra pessoa com deficiência: ele foi **vítima** e a imprensa registrou **vitória na Justiça**."
      politica: "A imprensa e as redes o associam a causas progressistas; já houve notícia de filiação partidária e possível candidatura — **confirmar situação atual** se a peça exigir neutralidade em período eleitoral."

  - name: "Mila Costa"
    tier: "Micros"
    risco_geral: "Baixo"
    resumo_tabela:
      concorrencia: "Sem bet."
      polemicas: "Conta hackeada (segurança), não conduta."
      politica: "Falou em não polarizar; alinhar neutralidade no contrato."
