  - name: "Cleane Sampaio"
    tier: "Mezzos"
    risco_geral: "Baixo"
    resumo_tabela:
      concorrencia: "Sem casa de aposta."
      polemicas: "Pouca polêmica grande na imprensa consultada."
      politica: "Sem política explícita recorrente; uso Nordeste sem viés forte."
